<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>DTO Flow Diagram</title>
  <desc>Shows how a DTO sits between the client and internal layers in a Spring Boot application</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="520" fill="#ffffff"/>

  <!-- Title -->
  <text x="340" y="34" text-anchor="middle" font-size="15" font-weight="500" fill="#1a1a1a">DTO flow in a Spring Boot application</text>
  <text x="340" y="54" text-anchor="middle" font-size="12" fill="#666">Client never receives the Entity directly — always through a Response DTO</text>

  <!-- CLIENT box -->
  <rect x="40" y="218" width="120" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="100" y="243" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Client</text>
  <text x="100" y="261" text-anchor="middle" font-size="12" fill="#185FA5">Browser / Mobile</text>

  <!-- Arrow: Client → Request DTO -->
  <line x1="160" y1="246" x2="208" y2="210" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <text x="172" y="222" text-anchor="middle" font-size="11" fill="#378ADD">JSON</text>

  <!-- REQUEST DTO box -->
  <rect x="210" y="178" width="140" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="280" y="202" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Request DTO</text>
  <text x="280" y="220" text-anchor="middle" font-size="12" fill="#0F6E56">CreateUserRequest</text>

  <!-- Arrow: Request DTO → Service -->
  <line x1="350" y1="206" x2="398" y2="242" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow-teal)"/>

  <!-- SERVICE LAYER box -->
  <rect x="400" y="218" width="140" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="470" y="243" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Service Layer</text>
  <text x="470" y="261" text-anchor="middle" font-size="12" fill="#534AB7">Business logic</text>

  <!-- Arrow: Service → Entity -->
  <line x1="470" y1="274" x2="470" y2="346" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow-purple)"/>
  <text x="508" y="315" text-anchor="start" font-size="11" fill="#534AB7">maps to</text>

  <!-- ENTITY box -->
  <rect x="400" y="348" width="140" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="470" y="372" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">Entity</text>
  <text x="470" y="390" text-anchor="middle" font-size="12" fill="#993C1D">User (DB model)</text>

  <!-- Arrow: Entity → DB -->
  <line x1="470" y1="404" x2="470" y2="455" stroke="#993C1D" stroke-width="1.2" marker-end="url(#arrow-coral)"/>

  <!-- DATABASE box -->
  <rect x="400" y="458" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="470" y="484" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Database</text>

  <!-- Arrow: Service → Response DTO -->
  <line x1="400" y1="248" x2="353" y2="316" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow-purple)"/>

  <!-- RESPONSE DTO box -->
  <rect x="210" y="318" width="140" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="280" y="342" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Response DTO</text>
  <text x="280" y="360" text-anchor="middle" font-size="12" fill="#0F6E56">UserResponse</text>

  <!-- Arrow: Response DTO → Client -->
  <line x1="210" y1="346" x2="163" y2="276" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow-teal)"/>
  <text x="148" y="312" text-anchor="end" font-size="11" fill="#1D9E75">JSON</text>

  <!-- Blocked path: Entity should never go to client -->
  <line x1="400" y1="370" x2="210" y2="346" stroke="#E24B4A" stroke-width="1" stroke-dasharray="5 4" fill="none"/>
  <text x="292" y="386" text-anchor="middle" font-size="11" fill="#A32D2D">✕ never expose entity directly</text>

  <!-- Legend -->
  <rect x="40" y="456" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="58" y="466" font-size="11" fill="#444">DTO</text>
  <rect x="100" y="456" width="12" height="12" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="118" y="466" font-size="11" fill="#444">Entity</text>
  <rect x="162" y="456" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="180" y="466" font-size="11" fill="#444">Service</text>
  <rect x="228" y="456" width="12" height="12" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="246" y="466" font-size="11" fill="#444">Client / DB</text>

  <!-- Border -->
  <rect x="1" y="1" width="678" height="518" rx="12" fill="none" stroke="#e0e0e0" stroke-width="1"/>
</svg>
