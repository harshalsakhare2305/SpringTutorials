<svg width="720" height="580" viewBox="0 0 720 580" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">

  <!-- Background -->
  <rect width="720" height="580" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" font-size="16" font-weight="bold" fill="#e6edf3">Spring Web MVC — Request Lifecycle</text>

  <!-- ===== NODES ===== -->

  <!-- 1. Browser -->
  <rect x="290" y="60" width="140" height="46" rx="8" fill="#1f2937" stroke="#4b9eff" stroke-width="1.5"/>
  <text x="360" y="79" text-anchor="middle" font-size="13" font-weight="bold" fill="#4b9eff">Browser</text>
  <text x="360" y="97" text-anchor="middle" font-size="11" fill="#8b949e">HTTP Request</text>

  <!-- Arrow 1 → 2 -->
  <line x1="360" y1="106" x2="360" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="370" y="122" font-size="10" fill="#8b949e">GET /products</text>

  <!-- 2. DispatcherServlet -->
  <rect x="255" y="132" width="210" height="46" rx="8" fill="#1a1f2e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="360" y="151" text-anchor="middle" font-size="13" font-weight="bold" fill="#a78bfa">DispatcherServlet</text>
  <text x="360" y="169" text-anchor="middle" font-size="11" fill="#8b949e">Front Controller</text>

  <!-- Arrow 2 → 3 (goes right to HandlerMapping) -->
  <line x1="465" y1="155" x2="530" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="470" y="148" font-size="10" fill="#8b949e">Who handles this?</text>

  <!-- 3. HandlerMapping -->
  <rect x="532" y="132" width="158" height="46" rx="8" fill="#1a1f2e" stroke="#34d399" stroke-width="1.5"/>
  <text x="611" y="151" text-anchor="middle" font-size="13" font-weight="bold" fill="#34d399">HandlerMapping</text>
  <text x="611" y="169" text-anchor="middle" font-size="11" fill="#8b949e">Finds handler method</text>

  <!-- Arrow 3 → back to DS (returns handler) -->
  <path d="M611 178 Q611 205 465 205" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="538" y="200" font-size="10" fill="#8b949e">returns handler</text>

  <!-- Arrow DS → Controller -->
  <line x1="360" y1="178" x2="360" y2="218" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 4. @Controller -->
  <rect x="255" y="220" width="210" height="46" rx="8" fill="#1a1f2e" stroke="#4b9eff" stroke-width="1.5"/>
  <text x="360" y="239" text-anchor="middle" font-size="13" font-weight="bold" fill="#4b9eff">@Controller</text>
  <text x="360" y="257" text-anchor="middle" font-size="11" fill="#8b949e">Your code runs here</text>

  <!-- Arrow Controller → Service (goes right) -->
  <line x1="465" y1="243" x2="530" y2="243" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 5. @Service -->
  <rect x="532" y="220" width="158" height="46" rx="8" fill="#1a1f2e" stroke="#f97316" stroke-width="1.5"/>
  <text x="611" y="239" text-anchor="middle" font-size="13" font-weight="bold" fill="#f97316">@Service</text>
  <text x="611" y="257" text-anchor="middle" font-size="11" fill="#8b949e">Business logic</text>

  <!-- Arrow Service returns data back -->
  <path d="M611 266 Q611 290 465 295" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="535" y="285" font-size="10" fill="#8b949e">returns data</text>

  <!-- Arrow Controller → Model -->
  <line x1="360" y1="266" x2="360" y2="308" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="370" y="292" font-size="10" fill="#8b949e">fills model</text>

  <!-- 6. Model -->
  <rect x="255" y="310" width="210" height="56" rx="8" fill="#1a1f2e" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="360" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#fbbf24">Model</text>
  <text x="360" y="348" text-anchor="middle" font-size="10" fill="#8b949e">{ "products" → [...] }</text>
  <text x="360" y="362" text-anchor="middle" font-size="10" fill="#8b949e">{ "title" → "All Products" }</text>

  <!-- Arrow Model → ViewResolver -->
  <line x1="360" y1="366" x2="360" y2="400" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="370" y="387" font-size="10" fill="#8b949e">+ view name</text>

  <!-- 7. ViewResolver -->
  <rect x="255" y="402" width="210" height="46" rx="8" fill="#1a1f2e" stroke="#34d399" stroke-width="1.5"/>
  <text x="360" y="421" text-anchor="middle" font-size="13" font-weight="bold" fill="#34d399">ViewResolver</text>
  <text x="360" y="439" text-anchor="middle" font-size="11" fill="#8b949e">Finds .jsp / .html file</text>

  <!-- Arrow ViewResolver → View -->
  <line x1="360" y1="448" x2="360" y2="482" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 8. View (JSP) -->
  <rect x="255" y="484" width="210" height="46" rx="8" fill="#1a1f2e" stroke="#86efac" stroke-width="1.5"/>
  <text x="360" y="503" text-anchor="middle" font-size="13" font-weight="bold" fill="#86efac">View (JSP)</text>
  <text x="360" y="521" text-anchor="middle" font-size="11" fill="#8b949e">Merges Model → HTML</text>

  <!-- Arrow View → Browser (curved back left) -->
  <path d="M255 507 Q120 507 120 86 Q120 83 290 83" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="88" y="300" font-size="10" fill="#8b949e" transform="rotate(-90 88 300)">Final HTML Response</text>

  <!-- Step numbers -->
  <circle cx="344" cy="119" r="9" fill="#4b9eff"/>
  <text x="344" y="123" text-anchor="middle" font-size="10" font-weight="bold" fill="#0d1117">1</text>

  <circle cx="344" cy="196" r="9" fill="#a78bfa"/>
  <text x="344" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#0d1117">2</text>

  <circle cx="344" cy="283" r="9" fill="#4b9eff"/>
  <text x="344" y="287" text-anchor="middle" font-size="10" font-weight="bold" fill="#0d1117">3</text>

  <circle cx="344" cy="385" r="9" fill="#fbbf24"/>
  <text x="344" y="389" text-anchor="middle" font-size="10" font-weight="bold" fill="#0d1117">4</text>

  <circle cx="344" cy="466" r="9" fill="#34d399"/>
  <text x="344" y="470" text-anchor="middle" font-size="10" font-weight="bold" fill="#0d1117">5</text>

  <circle cx="344" cy="549" r="9" fill="#86efac"/>
  <text x="344" y="553" text-anchor="middle" font-size="10" font-weight="bold" fill="#0d1117">6</text>

  <!-- Legend -->
  <text x="30" y="420" font-size="10" fill="#6e7681">── solid  = request flow</text>
  <text x="30" y="436" font-size="10" fill="#6e7681">- - dashed = return data</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

</svg>
