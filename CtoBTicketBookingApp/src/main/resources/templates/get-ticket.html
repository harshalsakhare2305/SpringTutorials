<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Find Ticket</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<header>

    Search Ticket

</header>

<div class="container">

    <div class="card">

        <form id="ticketForm">

            <div class="form-group">

                <label>Ticket ID</label>

                <input type="number"
                       id="ticketId"
                       required>

            </div>

            <button>

                Search

            </button>

        </form>

    </div>

</div>

<script>

    document.getElementById("ticketForm").onsubmit=function(e){

        e.preventDefault();

        let id=document.getElementById("ticketId").value;

        window.location="/get-ticket/"+id;

    }

</script>

</body>

</html>
