<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Customer Registration</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container">

    <h1>Customer Registration Form</h1>

    <form th:action="@{/register}"
          th:object="${emptyCustomer}"
          method="post">

        <div class="form-group">
            <label>First Name</label>

            <input
                    type="text"
                    th:field="*{first_name}"
                    placeholder="Enter First Name"
                    required>
        </div>

        <div class="form-group">
            <label>Last Name</label>

            <input
                    type="text"
                    th:field="*{last_name}"
                    placeholder="Enter Last Name"
                    required>
        </div>

        <div class="form-group">
            <label>Email</label>

            <input
                    type="email"
                    th:field="*{email}"
                    placeholder="Enter Email"
                    required>
        </div>

        <div class="form-group">
            <label>City</label>

            <input
                    type="text"
                    th:field="*{city}"
                    placeholder="Enter City"
                    required>
        </div>

        <button type="submit" class="btn">
            Register Customer
        </button>

    </form>

    <div class="link-area">
        <a th:href="@{/ctxinfo}">
            View All Customers
        </a>
    </div>

</div>

</body>
</html>
