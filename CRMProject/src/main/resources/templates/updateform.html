<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Update Customer</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container">

    <h1>Update Customer Details</h1>

    <form th:action="@{/update/{id}(id=${customer.C_id})}"
          th:object="${customer}"
          method="post">

        <!-- Hidden ID -->
        <input type="hidden" th:field="*{C_id}">

        <div class="form-group">
            <label>First Name</label>
            <input
                    type="text"
                    th:field="*{first_name}"
                    required>
        </div>

        <div class="form-group">
            <label>Last Name</label>
            <input
                    type="text"
                    th:field="*{last_name}"
                    required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input
                    type="email"
                    th:field="*{email}"
                    required>
        </div>

        <div class="form-group">
            <label>City</label>
            <input
                    type="text"
                    th:field="*{city}"
                    required>
        </div>

        <button type="submit" class="btn">
            Update Customer
        </button>

        <a th:href="@{/ctxinfo}" class="btn"
           style="background:#6c757d; margin-left:10px;">
            Cancel
        </a>

    </form>

</div>

</body>
</html>
