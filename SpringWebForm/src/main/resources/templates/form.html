<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Employee Form</title>
</head>

<body>

<h2>Employee Registration</h2>

<form th:action="@{/save}"
      th:object="${employee}"
      method="post">

    Name

    <input type="text"
           th:field="*{name}">

    <br><br>

    Email

    <input type="email"
           th:field="*{email}">

    <br><br>

    City

    <input type="text"
           th:field="*{city}">

    <br><br>

    <button type="submit">
        Submit
    </button>

</form>

</body>
</html>
